<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Schedulist - Server Connection Issue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-glass: rgba(255, 255, 255, 0.03);
      --border-glass: rgba(255, 255, 255, 0.08);
      --accent-primary: #6366f1;
      --accent-secondary: #ec4899;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: var(--font-family);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle at top right, rgba(236, 72, 153, 0.12), transparent 45%),
                        radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.12), transparent 45%);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .error-card {
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: 3rem;
      text-align: center;
      max-width: 480px;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    .spark-icon {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #ec4899, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 {
      font-size: 1.85rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }
    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 2rem;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .retry-btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent-primary) 0%, #4f46e5 100%);
      color: white;
      text-decoration: none;
      padding: 12px 32px;
      border: none;
      border-radius: var(--radius-full);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="spark-icon">✦ 50X CONNECTION ISSUE ✦</div>
    <h1>Timeline Out of Sync</h1>
    <p class="subtitle">Schedulist is having trouble communicating with the API servers. We are working to align your scheduler workstation.</p>
    <button class="retry-btn" onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
