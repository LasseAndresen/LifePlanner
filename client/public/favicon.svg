<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Midnight Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <!-- Neon Accent Glow -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <!-- Glass Overlap Shading -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Smooth rounded square base -->
  <rect width="100" height="100" rx="24" fill="url(#bgGrad)" stroke="#312e81" stroke-width="1.5" />
  
  <!-- Outer glowing ring -->
  <rect x="8" y="8" width="84" height="84" rx="18" fill="none" stroke="url(#neonGrad)" stroke-width="2" opacity="0.8" filter="url(#glow)" />
  
  <!-- Glass Layer -->
  <g transform="translate(18, 18)">
    <!-- Main Plan Symbol (overlapping cards) -->
    <rect x="8" y="8" width="48" height="48" rx="12" fill="url(#glassGrad)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" />
    <!-- Mini accent colored badge -->
    <circle cx="48" cy="16" r="6" fill="#ec4899" filter="url(#glow)" />
    <!-- Horizontal planner lines -->
    <line x1="20" y1="22" x2="36" y2="22" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7" />
    <line x1="20" y1="32" x2="44" y2="32" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5" />
    <line x1="20" y1="42" x2="32" y2="42" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5" />
  </g>
</svg>
